name: Build and Push dev api docker image

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to use for the workflow'
        required: true
        default: 'master'

jobs:
  build-and-push-dev-api:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: build docker image
        run: docker build -t ${{ env.DOCKER_USERNAME }}/test-dev-api:1.0.0 .

      - name: push docker image
        run: docker push ${{ env.DOCKER_USERNAME }}/test-dev-api:1.0.0
